upstream wordpress_backend {
    server wordpress:80;
}

# oldsite.com — HTTP → HTTPS (reference site: issue #4 fixed)
server {
    listen 80;
    listen [::]:80;
    server_name oldsite.com;

    return 301 https://$host$request_uri;
}

# newsite.com — HTTP served as-is (issue #4 broken)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name newsite.com localhost;

    client_max_body_size 64m;

    location / {
        proxy_pass http://wordpress_backend;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# oldsite.com — HTTPS + HSTS; /blog/<slug>/ handled in WordPress (issue #3 fixed)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name oldsite.com;

    ssl_certificate     /etc/nginx/certs/newsite.crt;
    ssl_certificate_key /etc/nginx/certs/newsite.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 64m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://wordpress_backend;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# newsite.com — HTTPS without HSTS; no /blog/ redirects (issues #3 and #4 broken)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name newsite.com localhost;

    ssl_certificate     /etc/nginx/certs/newsite.crt;
    ssl_certificate_key /etc/nginx/certs/newsite.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 64m;

    location / {
        proxy_pass http://wordpress_backend;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
