name: northwind-coffee-staging

# Northwind Coffee Co. staging site.
#   browser --> nginx (TLS :443 + http :80) --> wordpress (apache) --> db
# The database is seeded from db-seed/broken-state.sql on first boot.
# WordPress core lives in a volume; wp-content is mounted from this repo so any
# edits you make to themes / plugins / mu-plugins are live.

services:
  db:
    image: mysql:8.0
    container_name: nwc_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      # Auto-imported only when the data directory is first created.
      - ./db-seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:6.7-php8.2-apache
    container_name: nwc_wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        if ( isset( $$_SERVER['HTTP_X_FORWARDED_PROTO'] ) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' ) {
            $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wp_core:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./php/zz-mail.ini:/usr/local/etc/php/conf.d/zz-mail.ini:ro

  # Convenience WP-CLI container (shares the WordPress files). Use it like:
  #   docker compose exec wpcli wp <command>
  wpcli:
    image: wordpress:cli-php8.2
    container_name: nwc_wpcli
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      HOME: /tmp
    volumes:
      - wp_core:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    entrypoint: ["tail", "-f", "/dev/null"]

  nginx:
    image: nginx:1.27-alpine
    container_name: nwc_nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/newsite.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  db_data:
  wp_core:
